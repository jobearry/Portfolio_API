# Comments are provided throughout this file to help you get started.
# If you need more help, visit the Docker Compose reference guide at
# https://docs.docker.com/go/compose-spec-reference/

# Here the instructions define your application as a service called "server".
# This service is built from the Dockerfile in the current directory.
# You can add other services your application may depend on here, such as a
# database or a cache. For examples, see the Awesome Compose repository:
# https://github.com/docker/awesome-compose
services:
  server: 
    build:
      context: .
      target: final
    ports:
      - 5031:8080
    environment:
      - Jwt__Key=${Jwt__Key}
      - Jwt__Issuer=${Jwt__Issuer}
      - Jwt__Audience=${Jwt__Audience}
      - Jwt__Expires=${Jwt__Expires}
      - ConnectionStrings__DefaultConnection=${ConnectionStrings__DefaultConnection}
      - ConnectionStrings__JDBConnection=${ConnectionStrings__JDBConnection}
      - AzureAd__TenantId=${AzureAd__TenantId}
      - AzureAd__Instance=${AzureAd__Instance}
      - AzureAd__ClientSecret=${AzureAd__ClientSecret}
      - AzureAd__ClientId=${AzureAd__ClientId}
      - AzureAd__Audience=${AzureAd__Audience}
      - AzureAd__Scope=${AzureAd__Scope}
      - Notion__Token=${Notion__Token}
      - Notion__Version=${Notion__Version}
      - DOTNET_ENVIRONMENT=Development
      - DOTNET_SYSTEM_GLOBALIZATION_INVARIANT=false