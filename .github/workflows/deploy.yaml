name: Deploy to Azure
on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'   # adjust to your project’s target

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Publish
        run: dotnet publish -c Release -o ./publish

      - name: Deploy to jdbweb azure webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: jdbweb
          publish-profile: ${{secrets.AZURE_JDBWEB_PUBLISH_PROFILE}}