name: Deploy to Azure
on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to jdbweb azure webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: jdbweb
          publish-profile: ${{secrets.AZURE_JDBWEB_PUBLISH_PROFILE}}